name: RichillCapita.Api CI

on:
  push:
    branches: 
      - master
      - dev
  pull_request:
    branches: 
      - master
      - dev

env:
  CAKE_FILE: build.cake
  TARGET: Default
  CONFIGuRATION: Debug
  IMAGE_NAME: api
  APPLICATION_NAME: RichillCapital.Api

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Use Nerdbank.GitVersioning
      uses: dotnet/nbgv@master
      id: nbgv    

    - name: Determine the Build Version
      id: version
      run: echo "::set-output name=version::$(git describe --tags --abbrev=0 || date +'%Y%m%d')-${{ steps.nbgv.outputs.GitCommitIdShort }}"

    - name: .NET Build and Test
      uses: cake-build/cake-action@v2
      with:
        script-path: ${{ env.CAKE_FILE }}
        target: ${{ env.TARGET }}
        verbosity: Diagnostic
        arguments: |
          configuration: ${{ env.CONFIGuRATION }}
    
    - name: Build Docker Image
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:latest . 

    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: ${{ env.APPLICATION_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ env.Configuration }}
        path: ./publish          
  
  